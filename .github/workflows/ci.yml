name: CI pipeline

on:
  push:
    branches: [master]
    tags:
      - "*"
  pull_request:
    branches: [master]

env:
  BUILD_TYPE: Debug

jobs:
  # Python formatting and linting
  py_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Check Python formatting and linting
        run: scripts/format_py.sh check
  # Build C++ and Build Wheels
  build_x86:
    needs: py_lint
    name: Build C++ (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-conan-action

      - name: Conan install
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            export conan_profile=${{github.workspace}}/build/profile.txt
            ./scripts/setup_build.sh ${{github.workspace}}/build
          elif [ "$RUNNER_OS" == "Windows" ]; then
            conan install conan/conanfile_windows.txt -of=build/ -pr:b conan/profile_windows_x86_64.txt -pr:h conan/profile_windows_x86_64.txt --build=missing -s build_type=${{env.BUILD_TYPE}}
            mkdir -p ${{github.workspace}}/build
          else
            echo "$RUNNER_OS not supported"
            exit 1
          fi
        shell: bash

      - name: Install Gcovr, Lcov and AF_XDP deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt install gcovr lcov libxdp-dev libbpf-dev clang

      - name: Configure CMake
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            export cmake_generator="Unix Makefiles"
            export cmake_coverage="-DCODE_COVERAGE=ON"
            export cmake_af_xdp="-DENABLE_AF_XDP=ON"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            export cmake_generator="MinGW Makefiles"
            export cmake_coverage="-DCODE_COVERAGE=OFF"
            export cmake_af_xdp=""
          else
            echo "$RUNNER_OS not supported"
            exit 1
          fi
          cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBUILD_UNIT_TESTS=ON -G "${cmake_generator}" ${cmake_coverage} ${cmake_af_xdp}
        shell: bash

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      # Unit Tests and Coverage Report
      - name: Unit Test
        working-directory: ${{github.workspace}}/build
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            make coverage_xml
          elif [ "$RUNNER_OS" == "Windows" ]; then
            ctest . --output-on-failure
          else
            echo "$RUNNER_OS not supported"
            exit 1
          fi
        shell: bash

      - name: Upload Build Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: build/
          retention-days: 1

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: build/coverage_xml.xml
          if-no-files-found: error

  build_arm64:
    needs: py_lint
    name: Build C++ (ARM64)
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-conan-action

      - name: Install AF_XDP deps
        run: sudo apt-get update && sudo apt-get install -y libxdp-dev libbpf-dev clang

      - name: Conan install
        run: |
          export conan_profile=${{github.workspace}}/build/profile.txt
          ./scripts/setup_build.sh ${{github.workspace}}/build
        shell: bash

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DENABLE_AF_XDP=ON -G "Unix Makefiles"
        shell: bash

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Upload Build Artifacts (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: build-arm64
          path: build/
          retention-days: 1

  build-wheels:
    needs: py_lint
    name: Build Python Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    env:
      CIBW_ARCHS: native
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.0
        with:
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-kickcat-${{ matrix.os }}
          path: wheelhouse/*.whl

  # Build Conan Package
  build-conan-package:
    needs: build_x86
    name: Build Conan Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-conan-action
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-linux
          path: build/
      - name: Determine version
        run: |
          source tools/setup/version.sh
          echo "PKG_VERSION=$VERSION" >> $GITHUB_ENV
      - name: Conan Create
        run: |
          conan create conan/all --build=missing --version ${{ env.PKG_VERSION }} -pr:b build/profile.txt -pr:h build/profile.txt
      - name: Export Conan package
        run: |
          conan cache save "kickcat/${{ env.PKG_VERSION }}:*" --file kickcat-${{ env.PKG_VERSION }}-linux-x86_64.tgz
      - name: Upload Conan package artifact
        uses: actions/upload-artifact@v4
        with:
          name: conan-package
          path: kickcat-${{ env.PKG_VERSION }}-linux-x86_64.tgz
          if-no-files-found: error

  # Simulation Tests
  simulation_test:
    needs: [build_x86, build-wheels]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_case:
          - name: easycat
            example_bin: build/examples/master/easycat/easycat_example
            slave_config: simulation/slave_configs/freedom-k64f.json simulation/slave_configs/xmc4800.json
          - name: easycat_py
            example_bin: py_bindings/examples/easycat.py
            slave_config: simulation/slave_configs/freedom-k64f.json simulation/slave_configs/xmc4800.json
          - name: freedom-k64f
            example_bin: build/examples/master/freedom-k64f/freedom_k64f_static_map_example
            slave_config: simulation/slave_configs/freedom-k64f.json
          - name: freedom-k64f_py
            example_bin: py_bindings/examples/freedom-k64f.py
            slave_config: simulation/slave_configs/freedom-k64f.json
          - name: wdc-foot
            example_bin: build/examples/master/wdc_foot/wdc_foot_example
            slave_config: simulation/slave_configs/xmc4800.json

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AF_XDP runtime deps
        run: sudo apt-get update && sudo apt-get install -y libxdp1 libbpf1

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-linux
          path: build/

      - name: Download Wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheelhouse-kickcat-*
          path: wheelhouse
          merge-multiple: true

      - name: Install KickCAT Wheel
        run: |
          pip install kickcat --no-index --find-links wheelhouse

      - name: Fix permissions
        run: |
          chmod +x build/simulation/network_simulator
          chmod +x ${{ matrix.test_case.example_bin }}

      - name: Run Simulation Test (${{ matrix.test_case.name }})
        shell: bash
        run: |
          # 1. Start simulator in background
          ./build/simulation/network_simulator -i tap_nominal -s ${{ matrix.test_case.slave_config }} > simulator.log 2>&1 &
          SIM_PID=$!

          # 2. Wait a bit for simulator to start
          sleep 2

          # 3. Run example with timeout
          timeout 15s ${{ matrix.test_case.example_bin }} -i tap:client > test_output.log 2>&1 || true

          # 4. Stop simulator
          kill $SIM_PID || true

          # 5. Check results
          echo "--- Summary of Test Output (last 20 lines) ---"
          tail -n 20 test_output.log
          echo "----------------------------------------------"

          # Check OPERATIONAL reached
          if grep -qi "operational" test_output.log; then
              echo "SUCCESS: Reached OPERATIONAL state."
          else
              echo "FAILURE: Did NOT reach OPERATIONAL state."
              exit 1
          fi

          # Check example actually ran (not exited immediately)
          LINE_COUNT=$(wc -l < test_output.log)

          if [ "$LINE_COUNT" -gt 15 ]; then
              echo "SUCCESS: Runtime output detected."
          else
              echo "FAILURE: Output too short — example likely did not run."
              exit 1
          fi

          echo "Test passed!"

      - name: Upload Simulation Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: simulation-logs-${{ matrix.test_case.name }}
          path: |
            test_output.log
            simulator.log

  # NuttX Builds
  build_NuttX_stable:
    needs: py_lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - xmc4800-relax
          - arduino-due
          - freedom-k64f
    env:
      nuttx_version: 6161fececfb2e510cd947131634d8fa352657886
      nuttx_apps_version: c7ac7171673c5e8c12945b0c89d7a2537fd88745
      arm_none_eabi_version: 13.2.Rel1/binrel/arm-gnu-toolchain-13.2.Rel1-x86_64-arm-none-eabi

    steps:
      - name: Checkout KickCAT
        uses: actions/checkout@v4
        with:
          path: "KickCAT"
      - name: Cache NuttX
        id: cache-nuttx
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/nuttxspace/nuttx
          key: nuttx_${{ env.nuttx_version }}
      - if: ${{ steps.cache-nuttx.outputs.cache-hit != 'true' }}
        name: Checkout NuttX
        uses: actions/checkout@v4
        with:
          repository: apache/nuttx
          path: "nuttxspace/nuttx"
          ref: "${{ env.nuttx_version }}"
      - name: Cache NuttX Apps
        id: cache-nuttx-apps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/nuttxspace/apps
          key: nuttx-apps_${{ env.nuttx_apps_version }}
      - if: ${{ steps.cache-nuttx-apps.outputs.cache-hit != 'true' }}
        name: Checkout NuttX Apps
        uses: actions/checkout@v4
        with:
          repository: apache/nuttx-apps
          path: "nuttxspace/apps"
          ref: "${{ env.nuttx_apps_version }}"
      - name: Install Kconfig dependencies
        run: sudo apt-get update && sudo apt-get install -y kconfig-frontends
      - name: Cache ARM GCC Toolchain
        id: cache-arm-none-eabi
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/gcc-arm-none-eabi
          key: ${{ env.arm_none_eabi_version }}
      - if: ${{ steps.cache-arm-none-eabi.outputs.cache-hit != 'true' }}
        name: Download ARM GCC Toolchain
        run: |
          mkdir gcc-arm-none-eabi
          curl -s -L  "https://developer.arm.com/-/media/Files/downloads/gnu/${{env.arm_none_eabi_version}}.tar.xz" \
          | tar -C gcc-arm-none-eabi --strip-components=1 -xJ
      - name: Build ${{ matrix.board }}
        run: |
          export PATH="${{ github.workspace }}/gcc-arm-none-eabi/bin:$PATH"
          KickCAT/scripts/build_slave_bin.sh \
            ${{ matrix.board }} \
            ${{ github.workspace }}/nuttxspace/nuttx
      - name: Upload firmware binary for ${{ matrix.board }} nuttx stable version
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}-nuttx-stable
          path: KickCAT/build_${{ matrix.board }}/*.bin
          if-no-files-found: error
          retention-days: 1

  build_NuttX_master:
    needs: py_lint
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        board:
          - xmc4800-relax
          - arduino-due
          - freedom-k64f
    env:
      arm_none_eabi_version: 13.2.Rel1/binrel/arm-gnu-toolchain-13.2.Rel1-x86_64-arm-none-eabi
    steps:
      - name: checkout KickCAT
        uses: actions/checkout@v4
        with:
          path: "KickCAT"
      - name: checkout NuttX (master)
        uses: actions/checkout@v4
        with:
          repository: apache/nuttx
          path: "nuttxspace/nuttx"
          ref: "master"
      - name: checkout NuttX Apps (master)
        uses: actions/checkout@v4
        with:
          repository: apache/nuttx-apps
          path: "nuttxspace/apps"
          ref: "master"
      - name: apt update + Kconfig
        run: |
          sudo apt update
          sudo apt install -y kconfig-frontends
      - name: Cache Arm None Eabi
        id: cache-arm-none-eabi
        uses: actions/cache@v4
        with:
          path: ${{GITHUB.WORKSPACE}}/gcc-arm-none-eabi
          key: ${{env.arm_none_eabi_version}}
      - if: ${{ steps.cache-arm-none-eabi.outputs.cache-hit != 'true' }}
        name: Download gcc-arm-none-eabi
        run: |
          mkdir gcc-arm-none-eabi && \
          curl -s -L  "https://developer.arm.com/-/media/Files/downloads/gnu/${{env.arm_none_eabi_version}}.tar.xz" \
          | tar -C gcc-arm-none-eabi --strip-components 1 -xJ
      - name: Build ${{ matrix.board }}
        run: |
          export PATH="${{ github.workspace }}/gcc-arm-none-eabi/bin:$PATH"
          KickCAT/scripts/build_slave_bin.sh \
            ${{ matrix.board }} \
            ${{ github.workspace }}/nuttxspace/nuttx
      - name: Upload firmware binary for ${{ matrix.board }} nuttx master version
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}-nuttx-master
          path: KickCAT/build_${{ matrix.board }}/*.bin
          if-no-files-found: error
          retention-days: 1

  # Release
  release:
    needs: [build-wheels, simulation_test, build-conan-package, build_arm64]
    if: startsWith(github.ref, 'refs/tags/') # Only run on tag pushes
    runs-on: ubuntu-24.04
    environment:
      name: maintainer
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          pattern: wheelhouse-kickcat-*
          path: wheelhouse
          merge-multiple: true

      - name: Download Conan package artifact
        uses: actions/download-artifact@v4
        with:
          name: conan-package
          path: conan-package

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          gh release create "$tag" wheelhouse/*.whl conan-package/*.tgz \
              --repo="$GITHUB_REPOSITORY" \
              --title="${GITHUB_REPOSITORY#*/} ${tag#v}" \
              --generate-notes

      - name: Publish the wheels on PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: wheelhouse
          verify-metadata: true
          attestations: true
          print-hash: true
          skip-existing: true
