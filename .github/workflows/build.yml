name: PR build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  BUILD_TYPE: Debug

jobs:
  cpp_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: scripts/format_cpp.sh check

  build_x86:
    needs: cpp_lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-conan-action

      - name: Conan install
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            export conan_profile=${{github.workspace}}/build/profile.txt
            ./scripts/setup_build.sh ${{github.workspace}}/build
          elif [ "$RUNNER_OS" == "Windows" ]; then
            conan install conan/conanfile_windows.txt -of=build/ -pr:b conan/profile_windows_x86_64.txt -pr:h conan/profile_windows_x86_64.txt --build=missing -s build_type=${{env.BUILD_TYPE}}
            mkdir -p ${{github.workspace}}/build
          else
            echo "$RUNNER_OS not supported"
            exit 1
          fi

        shell: bash

      - name: Install Gcovr and Lcov
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt install gcovr lcov

      - name: Configure CMake
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            export cmake_generator="Unix Makefiles"
            export cmake_coverage="-DCODE_COVERAGE=ON"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            export cmake_generator="MinGW Makefiles"
            export cmake_coverage="-DCODE_COVERAGE=OFF"
          else
            echo "$RUNNER_OS not supported"
            exit 1
          fi
          cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBUILD_UNIT_TESTS=ON -G "${cmake_generator}" ${cmake_coverage}
        shell: bash

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            make coverage_xml
          elif [ "$RUNNER_OS" == "Windows" ]; then
            ctest . --output-on-failure
          else
            echo "$RUNNER_OS not supported"
            exit 1
          fi
        shell: bash

      - name: Upload Build Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: build/
          retention-days: 1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage
          path: build/coverage_xml.xml

  simulation_test:
    needs: build_x86
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_case:
          - name: easycat
            example_bin: build/examples/master/easycat/easycat_example
            eeprom: examples/slave/nuttx/lan9252/freedom-k64f/eeprom.bin

    steps:
      - uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-linux
          path: build/

      - name: Fix permissions
        run: |
          chmod +x build/simulation/network_simulator
          chmod +x ${{ matrix.test_case.example_bin }}

      - name: Run Simulation Test (${{ matrix.test_case.name }})
        shell: bash
        run: |
          # 1. Start simulator in background
          ./build/simulation/network_simulator -i tap_nominal -e ${{ matrix.test_case.eeprom }} > simulator.log 2>&1 &
          SIM_PID=$!

          # 2. Wait a bit for simulator to start
          sleep 2

          # 3. Run example with timeout
          timeout 15s ./${{ matrix.test_case.example_bin }} -i tap:client > test_output.log 2>&1 || true

          # 4. Stop simulator
          kill $SIM_PID || true

          # 5. Check results
          echo "--- Summary of Test Output (last 10 lines) ---"
          tail -n 10 test_output.log
          echo "----------------------------------------------"

          if grep -q "After OPERATIONAL - Slave info:" test_output.log; then
              echo "SUCCESS: ${{ matrix.test_case.name }} reached OPERATIONAL state."
          else
              echo "FAILURE: ${{ matrix.test_case.name }} did NOT reach OPERATIONAL state."
              exit 1
          fi

          if grep -q "input_slave_0:" test_output.log; then
               echo "SUCCESS: ${{ matrix.test_case.name }} received input data."
          else
              echo "FAILURE: ${{ matrix.test_case.name }} did NOT receive input data."
              exit 1
          fi

          echo "Test passed!"

      - name: Upload Simulation Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: simulation-logs-${{ matrix.test_case.name }}
          path: |
            test_output.log
            simulator.log

  build_NuttX_stable:
    needs: cpp_lint
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        board:
          - xmc4800-relax
          - arduino-due
          - freedom-k64f

    env:
      nuttx_version: 6161fececfb2e510cd947131634d8fa352657886
      nuttx_apps_version: c7ac7171673c5e8c12945b0c89d7a2537fd88745
      arm_none_eabi_version: 13.2.Rel1/binrel/arm-gnu-toolchain-13.2.Rel1-x86_64-arm-none-eabi

    steps:
      - name: Checkout KickCAT
        uses: actions/checkout@v4
        with:
          path: "KickCAT"

      - name: Cache NuttX
        id: cache-nuttx
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/nuttxspace/nuttx
          key: nuttx_${{ env.nuttx_version }}

      - if: ${{ steps.cache-nuttx.outputs.cache-hit != 'true' }}
        name: Checkout NuttX
        uses: actions/checkout@v4
        with:
          repository: apache/nuttx
          path: "nuttxspace/nuttx"
          ref: "${{ env.nuttx_version }}"

      - name: Cache NuttX Apps
        id: cache-nuttx-apps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/nuttxspace/apps
          key: nuttx-apps_${{ env.nuttx_apps_version }}

      - if: ${{ steps.cache-nuttx-apps.outputs.cache-hit != 'true' }}
        name: Checkout NuttX Apps
        uses: actions/checkout@v4
        with:
          repository: apache/nuttx-apps
          path: "nuttxspace/apps"
          ref: "${{ env.nuttx_apps_version }}"

      - name: Install Kconfig dependencies
        run: sudo apt-get update && sudo apt-get install -y kconfig-frontends

      - name: Cache ARM GCC Toolchain
        id: cache-arm-none-eabi
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/gcc-arm-none-eabi
          key: ${{ env.arm_none_eabi_version }}

      - if: ${{ steps.cache-arm-none-eabi.outputs.cache-hit != 'true' }}
        name: Download ARM GCC Toolchain
        run: |
          mkdir gcc-arm-none-eabi
          curl -s -L  "https://developer.arm.com/-/media/Files/downloads/gnu/${{env.arm_none_eabi_version}}.tar.xz" \
          | tar -C gcc-arm-none-eabi --strip-components=1 -xJ

      - name: Build ${{ matrix.board }}
        run: |
          export PATH="${{ github.workspace }}/gcc-arm-none-eabi/bin:$PATH"
          KickCAT/scripts/build_slave_bin.sh \
            ${{ matrix.board }} \
            ${{ github.workspace }}/nuttxspace/nuttx

      - name: Upload firmware binary for ${{ matrix.board }} nuttx stable version
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}-nuttx-stable
          path: KickCAT/build_${{ matrix.board }}/*.bin
          if-no-files-found: error
          retention-days: 1

  build_NuttX_master:
    needs: cpp_lint
    runs-on: ubuntu-latest

    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        board:
          - xmc4800-relax
          - arduino-due
          - freedom-k64f
    env:
      arm_none_eabi_version: 13.2.Rel1/binrel/arm-gnu-toolchain-13.2.Rel1-x86_64-arm-none-eabi
    steps:
      - name: checkout KickCAT
        uses: actions/checkout@v4
        with:
          path: "KickCAT"

      - name: checkout NuttX (master)
        uses: actions/checkout@v4
        with:
          repository: apache/nuttx
          path: "nuttxspace/nuttx"
          ref: "master"

      - name: checkout NuttX Apps (master)
        uses: actions/checkout@v4
        with:
          repository: apache/nuttx-apps
          path: "nuttxspace/apps"
          ref: "master"

      - name: apt update + Kconfig
        run: |
          sudo apt update
          sudo apt install -y kconfig-frontends

      - name: Cache Arm None Eabi
        id: cache-arm-none-eabi
        uses: actions/cache@v4
        with:
          path: ${{GITHUB.WORKSPACE}}/gcc-arm-none-eabi
          key: ${{env.arm_none_eabi_version}}

      - if: ${{ steps.cache-arm-none-eabi.outputs.cache-hit != 'true' }}
        name: Download gcc-arm-none-eabi
        run: |
          # Download the latest ARM GCC toolchain prebuilt by ARM
          mkdir gcc-arm-none-eabi && \
          curl -s -L  "https://developer.arm.com/-/media/Files/downloads/gnu/${{env.arm_none_eabi_version}}.tar.xz" \
          | tar -C gcc-arm-none-eabi --strip-components 1 -xJ

      - name: Build ${{ matrix.board }}
        run: |
          export PATH="${{ github.workspace }}/gcc-arm-none-eabi/bin:$PATH"
          KickCAT/scripts/build_slave_bin.sh \
            ${{ matrix.board }} \
            ${{ github.workspace }}/nuttxspace/nuttx

      - name: Upload firmware binary for ${{ matrix.board }} nuttx master version
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}-nuttx-master
          path: KickCAT/build_${{ matrix.board }}/*.bin
          if-no-files-found: error
          retention-days: 1
